spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/fabric_store_v2}
spring.datasource.username=${DB_USERNAME:admin_fabric}
spring.datasource.password=${DB_PASSWORD:admin_fabric}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}

cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.default-page-size=20

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method