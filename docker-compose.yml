version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: fabric_store_db_v2
    environment:
      POSTGRES_USER: ${DB_USERNAME:-admin_fabric}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin_fabric}
      POSTGRES_DB: ${DB_NAME:-fabric_store_v2}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-admin_fabric} -d ${DB_NAME:-fabric_store_v2}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: dockerfile
    container_name: fabric_store_api
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-fabric_store_v2}
      DB_USERNAME: ${DB_USERNAME:-admin_fabric}
      DB_PASSWORD: ${DB_PASSWORD:-admin_fabric}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: fabric_store_web
    ports:
      - "80:80"
    depends_on:
      - api
    restart: on-failure

volumes:
  postgres_data_v2: